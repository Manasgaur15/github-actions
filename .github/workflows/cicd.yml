name: CICD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: This is the env where the wf runs  
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "cloning code form github"

  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: Build docker container
        run: echo "Docker container built"


  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: testing contianer
        run: echo "testing the container"

  deploy:
    if: inputs.environment == 'dev'
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: final deployment
        run: echo "Application successfully deployed"
        
